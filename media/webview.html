<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; media-src *;" />
<title>Voice AI Mic</title>
<style>
  body {
    font-family: var(--vscode-font-family, sans-serif);
    color: var(--vscode-foreground);
    background: var(--vscode-editor-background);
    padding: 1rem;
    font-size: 13px;
  }
  h3 { margin-top: 0; }
  #status { margin-top: 1rem; font-size: 1.1rem; }
  .dot {
    display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    background: #888; margin-right: 8px; vertical-align: middle;
  }
  .dot.rec { background: #e24; animation: pulse 1s infinite; }
  .dot.wake { background: #4caf50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%{opacity:1} 50%{opacity:.3} 100%{opacity:1} }
  button {
    padding: .5rem 1rem; font-size: 1rem; cursor: pointer;
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
    border: 1px solid var(--vscode-button-border, transparent);
  }
  button:hover { background: var(--vscode-button-hoverBackground); }
  #meter {
    width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: .5rem; overflow: hidden;
  }
  #meterFill { height: 100%; width: 0%; background: #4caf50; transition: width 60ms linear; }
  .muted { opacity: .7; font-size: .9em; }
  .hint { opacity: .6; font-size: .85em; margin-top: .75rem; }
</style>
</head>
<body>
<h3>🎙️ Voice AI Microphone</h3>
<p class="muted">
  Keep this panel open. Press <b>Ctrl+Shift+Space</b> (or click the mic in the status bar)
  to start/stop recording. All audio is processed locally — nothing leaves this machine.
</p>
<button id="init">Grant Microphone Access</button>
<div id="status"><span class="dot" id="dot"></span><span id="label">Not initialized</span></div>
<div id="meter"><div id="meterFill"></div></div>
<div class="hint" id="modeHint"></div>

<script>
(function () {
  const vscode = acquireVsCodeApi();

  const TARGET_RATE = 16000;
  const MAX_PREVIEW_SECONDS = 20;    // cap interim-chunk size so long recordings stay snappy
  const WAKE_PREROLL_SECONDS = 0.7;  // audio kept before wake fires, to avoid clipping first syllable

  const config = {
    streamingPreview: true,
    streamingChunkSeconds: 3,
    autoStopOnSilence: true,
    silenceThresholdDb: -45,
    silenceDurationMs: 1200,
    wakeOnVoice: false,
    wakeThresholdDb: -30,
    wakeDurationMs: 400,
  };

  let audioCtx = null;
  let mediaStream = null;
  let source = null;
  let processor = null;
  let inputRate = TARGET_RATE;
  let buffers = [];
  let preRoll = [];                  // ring of recent Float32Arrays while idle, seeded into buffers on wake
  let preRollSamples = 0;
  let startedFromWake = false;
  let recording = false;
  let initialized = false;

  // Silence/wake tracking (ms-based, updated on each audio frame)
  let recordingStartedAt = 0;
  let silenceStartedAt = 0;    // 0 when not currently in a silence run
  let voiceStartedAt = 0;      // 0 when not currently in a voice run (for wake)
  let lastChunkAt = 0;
  let chunkRunning = false;

  const dot = document.getElementById('dot');
  const label = document.getElementById('label');
  const initBtn = document.getElementById('init');
  const meterFill = document.getElementById('meterFill');
  const modeHint = document.getElementById('modeHint');

  function post(m) { vscode.postMessage(m); }
  function log(m) { post({ type: 'log', message: String(m) }); }

  function updateModeHint() {
    const bits = [];
    if (config.wakeOnVoice) bits.push('wake-on-voice');
    if (config.autoStopOnSilence) bits.push('auto-stop on silence');
    if (config.streamingPreview) bits.push('live preview');
    modeHint.textContent = bits.length ? 'Active: ' + bits.join(', ') : '';
  }

  function setIdleLabel() {
    if (config.wakeOnVoice && initialized) {
      dot.classList.remove('rec');
      dot.classList.add('wake');
      label.textContent = 'Listening for voice…';
    } else {
      dot.classList.remove('rec', 'wake');
      label.textContent = initialized ? 'Ready' : 'Not initialized';
    }
  }

  async function initMic() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
      try {
        audioCtx = new AudioContext({ sampleRate: TARGET_RATE });
      } catch (e) {
        audioCtx = new AudioContext();
      }
      inputRate = audioCtx.sampleRate;
      log('AudioContext sampleRate = ' + inputRate);

      source = audioCtx.createMediaStreamSource(mediaStream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = onAudio;
      source.connect(processor);
      const silent = audioCtx.createGain();
      silent.gain.value = 0;
      processor.connect(silent);
      silent.connect(audioCtx.destination);

      initialized = true;
      initBtn.style.display = 'none';
      setIdleLabel();
      post({ type: 'ready' });
    } catch (err) {
      label.textContent = 'Mic blocked';
      post({ type: 'error', message: 'Microphone access failed: ' + err.message });
    }
  }

  function onAudio(e) {
    const ch = e.inputBuffer.getChannelData(0);
    const now = performance.now();

    let peak = 0;
    for (let i = 0; i < ch.length; i++) {
      const v = Math.abs(ch[i]);
      if (v > peak) peak = v;
    }
    meterFill.style.width = Math.min(100, peak * 140) + '%';

    const peakDb = peak > 0 ? 20 * Math.log10(peak) : -120;

    if (recording) {
      buffers.push(new Float32Array(ch));
      preRoll = [];
      preRollSamples = 0;

      if (config.autoStopOnSilence) {
        const elapsed = now - recordingStartedAt;
        if (elapsed > 500) {
          if (peakDb < config.silenceThresholdDb) {
            if (silenceStartedAt === 0) { silenceStartedAt = now; }
            else if (now - silenceStartedAt >= config.silenceDurationMs) {
              stop();
              return;
            }
          } else {
            silenceStartedAt = 0;
          }
        }
      }

      if (config.streamingPreview && !chunkRunning) {
        const chunkMs = config.streamingChunkSeconds * 1000;
        if (now - lastChunkAt >= chunkMs && buffers.length > 0) {
          emitChunk();
        }
      }
      return;
    }

    // Not recording — watch for wake if enabled. Keep a short pre-roll so the
    // first syllable isn't clipped when wake fires.
    if (config.wakeOnVoice && initialized) {
      preRoll.push(new Float32Array(ch));
      preRollSamples += ch.length;
      const maxPre = Math.floor(WAKE_PREROLL_SECONDS * inputRate);
      while (preRollSamples - (preRoll[0]?.length ?? 0) > maxPre && preRoll.length > 1) {
        preRollSamples -= preRoll.shift().length;
      }
      if (peakDb >= config.wakeThresholdDb) {
        if (voiceStartedAt === 0) { voiceStartedAt = now; }
        else if (now - voiceStartedAt >= config.wakeDurationMs) {
          voiceStartedAt = 0;
          startedFromWake = true;
          post({ type: 'wake' });
        }
      } else {
        voiceStartedAt = 0;
      }
    }
  }

  function emitChunk() {
    chunkRunning = true;
    lastChunkAt = performance.now();
    try {
      const maxSamples = Math.floor(MAX_PREVIEW_SECONDS * inputRate);
      const snapshot = flattenTail(buffers, maxSamples);
      if (snapshot.length === 0) return;
      const resampled = (inputRate === TARGET_RATE) ? snapshot : resampleLinear(snapshot, inputRate, TARGET_RATE);
      const wav = encodeWav(resampled, TARGET_RATE);
      const b64 = bytesToBase64(new Uint8Array(wav));
      post({ type: 'chunk', data: b64 });
    } finally {
      setTimeout(() => { chunkRunning = false; }, 100);
    }
  }

  function start() {
    if (!initialized || !audioCtx) {
      post({ type: 'error', message: 'Mic not initialized — click "Grant Microphone Access".' });
      return;
    }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    buffers = startedFromWake ? preRoll.slice() : [];
    startedFromWake = false;
    preRoll = [];
    preRollSamples = 0;
    recording = true;
    recordingStartedAt = performance.now();
    silenceStartedAt = 0;
    voiceStartedAt = 0;
    lastChunkAt = recordingStartedAt;
    chunkRunning = false;
    dot.classList.remove('wake');
    dot.classList.add('rec');
    label.textContent = 'Recording…';
    post({ type: 'started' });
  }

  function stop() {
    if (!recording) return;
    recording = false;
    dot.classList.remove('rec');
    label.textContent = 'Encoding…';

    const flat = flatten(buffers);
    buffers = [];
    if (flat.length === 0) {
      setIdleLabel();
      post({ type: 'audio', data: '' });
      return;
    }

    const resampled = (inputRate === TARGET_RATE) ? flat : resampleLinear(flat, inputRate, TARGET_RATE);
    const wav = encodeWav(resampled, TARGET_RATE);
    const b64 = bytesToBase64(new Uint8Array(wav));

    label.textContent = 'Transcribing…';
    post({ type: 'audio', data: b64 });
    setTimeout(() => { if (!recording) setIdleLabel(); }, 1500);
  }

  function flatten(chunks) {
    let total = 0;
    for (const b of chunks) total += b.length;
    const flat = new Float32Array(total);
    let off = 0;
    for (const b of chunks) { flat.set(b, off); off += b.length; }
    return flat;
  }

  function flattenTail(chunks, maxSamples) {
    let total = 0;
    for (const b of chunks) total += b.length;
    if (total <= maxSamples) return flatten(chunks);
    const flat = new Float32Array(maxSamples);
    let skipped = total - maxSamples;
    let off = 0;
    for (const b of chunks) {
      if (skipped >= b.length) { skipped -= b.length; continue; }
      const take = b.subarray(skipped);
      skipped = 0;
      flat.set(take, off);
      off += take.length;
    }
    return flat;
  }

  function resampleLinear(input, inRate, outRate) {
    const ratio = inRate / outRate;
    const outLen = Math.floor(input.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const src = i * ratio;
      const i0 = Math.floor(src);
      const i1 = Math.min(i0 + 1, input.length - 1);
      const t = src - i0;
      out[i] = input[i0] * (1 - t) + input[i1] * t;
    }
    return out;
  }

  function encodeWav(samples, sampleRate) {
    const byteLen = samples.length * 2;
    const buf = new ArrayBuffer(44 + byteLen);
    const dv = new DataView(buf);
    const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) dv.setUint8(o + i, s.charCodeAt(i)); };

    writeStr(0, 'RIFF');
    dv.setUint32(4, 36 + byteLen, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    dv.setUint32(16, 16, true);
    dv.setUint16(20, 1, true);
    dv.setUint16(22, 1, true);
    dv.setUint32(24, sampleRate, true);
    dv.setUint32(28, sampleRate * 2, true);
    dv.setUint16(32, 2, true);
    dv.setUint16(34, 16, true);
    writeStr(36, 'data');
    dv.setUint32(40, byteLen, true);

    let offset = 44;
    for (let i = 0; i < samples.length; i++, offset += 2) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      dv.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    }
    return buf;
  }

  function bytesToBase64(bytes) {
    let binary = '';
    const CHUNK = 0x8000;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    return btoa(binary);
  }

  initBtn.addEventListener('click', initMic);
  initMic();

  window.addEventListener('message', (e) => {
    const m = e.data || {};
    if (m.type === 'start') { start(); }
    else if (m.type === 'stop') { stop(); }
    else if (m.type === 'config') {
      Object.assign(config, {
        streamingPreview: !!m.streamingPreview,
        streamingChunkSeconds: Math.max(1, Number(m.streamingChunkSeconds) || 3),
        autoStopOnSilence: !!m.autoStopOnSilence,
        silenceThresholdDb: Number(m.silenceThresholdDb) || -45,
        silenceDurationMs: Math.max(200, Number(m.silenceDurationMs) || 1200),
        wakeOnVoice: !!m.wakeOnVoice,
        wakeThresholdDb: Number(m.wakeThresholdDb) || -30,
        wakeDurationMs: Math.max(100, Number(m.wakeDurationMs) || 400),
      });
      updateModeHint();
      if (!recording) setIdleLabel();
    }
  });
})();
</script>
</body>
</html>
