name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p .
      - run: npx @vscode/vsce package --no-dependencies --out local-voice-ai.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: local-voice-ai-vsix
          path: local-voice-ai.vsix
          retention-days: 14
