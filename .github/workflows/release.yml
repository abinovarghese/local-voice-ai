name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx tsc -p .
      - name: Package VSIX
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx @vscode/vsce package --no-dependencies --out "local-voice-ai-${VERSION}.vsix"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-voice-ai-*.vsix
          generate_release_notes: true
          draft: false
          prerelease: false
